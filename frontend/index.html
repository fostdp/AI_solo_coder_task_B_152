<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代被中香炉（银熏球）万向平衡机构仿真与抗晃荡分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0e17;
            color: #e0e6f0;
            overflow: hidden;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 420px;
            grid-template-rows: 70px 1fr 240px;
            height: 100vh;
            gap: 1px;
            background: #1a2233;
        }
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1a2233 0%, #0f1520 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid #2a3548;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #d4a853, #f4d487);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-info {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: #8899aa;
        }
        .header-info .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 6px;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .viewer {
            background: #050810;
            position: relative;
        }
        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .viewer-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(8px);
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid #2a3548;
            font-size: 12px;
        }
        .viewer-overlay h3 {
            color: #d4a853;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .viewer-overlay .info-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 3px 0;
        }
        .viewer-overlay .info-label {
            color: #8899aa;
        }
        .viewer-overlay .info-value {
            color: #e0e6f0;
            font-family: 'Courier New', monospace;
        }
        .side-panel {
            background: #0f1520;
            overflow-y: auto;
            padding: 20px;
            border-left: 1px solid #2a3548;
        }
        .side-panel::-webkit-scrollbar {
            width: 6px;
        }
        .side-panel::-webkit-scrollbar-thumb {
            background: #2a3548;
            border-radius: 3px;
        }
        .panel-section {
            margin-bottom: 24px;
        }
        .panel-section h2 {
            font-size: 14px;
            color: #d4a853;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a3548;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .censer-selector {
            width: 100%;
            padding: 10px 14px;
            background: #1a2233;
            border: 1px solid #2a3548;
            border-radius: 6px;
            color: #e0e6f0;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .censer-selector:focus {
            outline: none;
            border-color: #d4a853;
        }
        .metric-card {
            background: #1a2233;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid #2a3548;
        }
        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .metric-label {
            font-size: 12px;
            color: #8899aa;
        }
        .metric-value {
            font-size: 20px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .metric-value.gold { color: #d4a853; }
        .metric-value.green { color: #4ade80; }
        .metric-value.red { color: #f87171; }
        .metric-value.yellow { color: #fbbf24; }
        .metric-value.cyan { color: #22d3ee; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #0a0e17;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .progress-fill.green { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .progress-fill.yellow { background: linear-gradient(90deg, #eab308, #fbbf24); }
        .progress-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }
        .bottom-panel {
            grid-column: 1 / -1;
            background: #0f1520;
            border-top: 1px solid #2a3548;
            padding: 16px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .chart-container {
            background: #1a2233;
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid #2a3548;
        }
        .chart-title {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 8px;
        }
        canvas.chart {
            width: 100%;
            height: 130px;
        }
        .alert-feed {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 440px;
            max-height: 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .alert-item {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid #ef4444;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 12px;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .alert-item.warning {
            background: rgba(251, 191, 36, 0.15);
            border-left-color: #fbbf24;
        }
        .alert-item.critical {
            background: rgba(239, 68, 68, 0.25);
            border-left-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .analysis-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .analysis-btn {
            flex: 1;
            padding: 8px 10px;
            background: #1a2233;
            border: 1px solid #2a3548;
            border-radius: 5px;
            color: #e0e6f0;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .analysis-btn:hover {
            background: #252f42;
            border-color: #d4a853;
            color: #d4a853;
        }
        .analysis-btn.active {
            background: rgba(212, 168, 83, 0.2);
            border-color: #d4a853;
            color: #d4a853;
        }
        .analysis-result {
            margin-top: 10px;
            padding: 10px;
            background: #0a0e17;
            border-radius: 6px;
            font-size: 11px;
        }
        .analysis-result-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }
        .analysis-result-row span:first-child {
            color: #8899aa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏮 古代被中香炉（银熏球）万向平衡机构仿真与抗晃荡分析系统</h1>
            <div class="header-info">
                <div><span class="status-dot" id="conn-dot"></span><span id="conn-status">连接中...</span></div>
                <div id="current-time">--:--:--</div>
            </div>
        </div>

        <div class="viewer">
            <canvas id="three-canvas"></canvas>
            <div class="viewer-overlay">
                <h3>万向环姿态</h3>
                <div class="info-row"><span class="info-label">内环角度:</span><span class="info-value" id="ov-inner">0.00°</span></div>
                <div class="info-row"><span class="info-label">外环角度:</span><span class="info-value" id="ov-outer">0.00°</span></div>
                <div class="info-row"><span class="info-label">炉体倾角:</span><span class="info-value" id="ov-tilt">0.00°</span></div>
                <div class="info-row"><span class="info-label">晃荡加速度:</span><span class="info-value" id="ov-slosh">0.00 m/s²</span></div>
            </div>
            <div class="alert-feed" id="alert-feed"></div>
        </div>

        <div class="side-panel">
            <div class="panel-section">
                <h2>🪙 香炉设备</h2>
                <select class="censer-selector" id="censer-select"></select>
            </div>

            <div class="panel-section">
                <h2>📊 稳定性指标</h2>
                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">平衡评分</span>
                        <span class="metric-value green" id="balance-score">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill green" id="balance-bar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">洒香风险</span>
                        <span class="metric-value green" id="spill-risk">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill green" id="spill-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">炉体倾角</span>
                        <span class="metric-value cyan" id="body-tilt">--°</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill cyan" id="tilt-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h2>🔬 抗晃荡分析</h2>
                <div class="analysis-controls">
                    <button class="analysis-btn" data-motion="walking">步行</button>
                    <button class="analysis-btn" data-motion="horse_riding">骑马</button>
                    <button class="analysis-btn" data-motion="running">奔跑</button>
                </div>
                <div class="analysis-controls">
                    <button class="analysis-btn" data-motion="car_ride">乘车</button>
                    <button class="analysis-btn" data-motion="sedan_chair">抬轿</button>
                </div>
                <div class="analysis-result" id="analysis-result">
                    <div style="color:#8899aa;">选择运动模式进行分析...</div>
                </div>
            </div>

            <div class="panel-section">
                <h2>⚙️ 仿真参数</h2>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">内环质量:</span><span style="font-size:12px;" id="cfg-inner-mass">-- kg</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">外环质量:</span><span style="font-size:12px;" id="cfg-outer-mass">-- kg</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">炉体质量:</span><span style="font-size:12px;" id="cfg-body-mass">-- kg</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">阻尼系数:</span><span style="font-size:12px;" id="cfg-damping">--</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">摩擦系数:</span><span style="font-size:12px;" id="cfg-friction">--</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">倾角告警阈值:</span><span style="font-size:12px;" id="cfg-tilt-th">--°</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">香料粘度:</span><span style="font-size:12px;" id="cfg-viscosity">-- Pa·s</span></div>
                <div class="info-row" style="padding:4px 0;"><span style="color:#8899aa;font-size:12px;">填充率:</span><span style="font-size:12px;" id="cfg-fill-ratio">--</span></div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="chart-container">
                <div class="chart-title">内环/外环角度 (°)</div>
                <canvas class="chart" id="chart-rings"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">炉体倾角历史 (°)</div>
                <canvas class="chart" id="chart-tilt"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">平衡评分 / 洒香风险</div>
                <canvas class="chart" id="chart-balance"></canvas>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
